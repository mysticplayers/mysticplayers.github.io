<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabby-Stab Time</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Standard thick font that doesn't need a Google link */
            font-family: "Arial Black", Gadget, sans-serif;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        img {
            max-width: 80vw;
            max-height: 60vh;
            border: 4px solid #fff;
        }

        h1 {
            color: #ffffff;
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            /* Simplified shadow: just one solid red block */
            text-shadow: 5px 5px #ff0000;
            /* Simple bounce animation */
            animation: bounce 0.4s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://tenor.com/bem66.gif" alt="Dancing GIF">
        <h1>stabby-stab time</h1>
    </div>

</body>
</html>

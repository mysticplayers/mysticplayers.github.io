<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audition Animation</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #f0faff;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    border-bottom: 5px solid #1c9ed9;
  }

  .character {
    position: absolute;
    bottom: 5px;
    width: 80px;
    height: 80px;
    animation: runAcross 6s infinite linear;
  }

  .blob {
    fill: #ff6b6b;
    animation: squish 0.5s infinite alternate ease-in-out;
  }

  @keyframes runAcross {
    0% { left: -100px; }
    100% { left: 100vw; }
  }

  @keyframes squish {
    from { transform: scaleY(1); }
    to { transform: scaleY(0.9) scaleX(1.05); }
  }

  .leg {
    fill: #333;
    animation: kick 0.2s infinite alternate;
    transform-origin: center;
  }

  .leg-right {
    animation-delay: 0.1s;
  }

  @keyframes kick {
    from { transform: translateY(0); }
    to { transform: translateY(-5px) rotate(10deg); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="character">
    <svg viewBox="0 0 100 100" width="100" height="100">
      <rect class="leg leg-left" x="30" y="80" width="10" height="15" rx="5" />
      <rect class="leg leg-right" x="60" y="80" width="10" height="15" rx="5" />
      <circle class="blob" cx="50" cy="50" r="40" />
      <circle fill="white" cx="35" cy="45" r="5" />
      <circle fill="white" cx="65" cy="45" r="5" />
      <circle fill="black" cx="35" cy="45" r="2" />
      <circle fill="black" cx="65" cy="45" r="2" />
      <circle fill="#ff9e9e" cx="25" cy="55" r="4" opacity="0.6" />
      <circle fill="#ff9e9e" cx="75" cy="55" r="4" opacity="0.6" />
    </svg>
  </div>
</div>

</body>
</html>

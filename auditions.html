<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container to stack GIF and Text vertically */
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        img {
            max-width: 80vw;
            max-height: 60vh;
            object-fit: contain;
            border: 2px solid #300; /* Subtle dark red border */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        h1 {
            color: #ff0000;
            font-family: 'Creepster', cursive; /* Spooky font */
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            /* Combining two animations: flickering and a slow pulse */
            animation: flicker 1.5s infinite, pulse 3s infinite ease-in-out;
            text-shadow: 0 0 10px #600, 0 0 20px #900;
        }

        /* The flickering effect */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        /* The pulsing/breathing effect */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); color: #800000; }
        }

        /* Mobile adjustment */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExY3FhemFvbmE4czc3M3FuczhqaWE2OWtycDl6eWhoczExdml5ajA5OSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/efKutiYNLATmBROOYM/giphy.gif" alt="Infernal GIF">
        
        <h1>Welcome to Hell</h1>
    </div>

</body>
</html>

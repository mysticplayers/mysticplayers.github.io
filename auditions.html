<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Display</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Change to any color you like */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents scrolling */
        }

        img {
            max-width: 90%; /* Keeps the GIF from touching the edges */
            max-height: 90%;
            object-fit: contain;
        }
    </style>
</head>
<body>

</html>

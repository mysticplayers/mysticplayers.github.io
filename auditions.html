<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabby-Stab Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        img {
            max-width: 85vw;
            max-height: 60vh;
            border: 5px solid #fff;
            box-shadow: 0 0 20px #ff0000;
            /* Makes the GIF itself bounce/dance */
            animation: dance 0.5s infinite alternate ease-in-out;
        }

        h1 {
            color: #ffffff;
            font-family: 'Luckiest Guy', cursive; /* Fun, bubbly font */
            font-size: 4.5rem;
            margin: 0;
            padding-top: 10px;
            text-transform: uppercase;
            /* White text with a "bloody" dripping shadow effect */
            text-shadow: 
                3px 3px 0px #ff0000, 
                6px 12px 0px rgba(180, 0, 0, 0.8);
            animation: jitter 0.1s infinite;
        }

        /* The "Dance" animation for the GIF */
        @keyframes dance {
            from { transform: rotate(-3deg) translateY(0); }
            to { transform: rotate(3deg) translateY(-10px); }
        }

        /* The "Jitter" animation for the text */
        @keyframes jitter {
            0% { transform: translate(0, 0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, 2px); }
            100% { transform: translate(0, 0); }
        }

        /* Mobile View */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://tenor.com/bem66.gif" alt="Dancing GIF">
        
        <h1>stabby-stab time</h1>
    </div>

</body>
</html>

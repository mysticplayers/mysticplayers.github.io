<style>

/* HERO SLIDESHOW */

.hero{
position:relative;
height:80vh;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
animation:slideShow 20s infinite;
}

.slide:nth-child(1){
background-image:url("https://your-image-link-1.jpg");
animation-delay:0s;
}

.slide:nth-child(2){
background-image:url("https://your-image-link-2.jpg");
animation-delay:5s;
}

.slide:nth-child(3){
background-image:url("https://your-image-link-3.jpg");
animation-delay:10s;
}

.slide:nth-child(4){
background-image:url("https://your-image-link-4.jpg");
animation-delay:15s;
}

@keyframes slideShow{
0%{opacity:0}
5%{opacity:1}
25%{opacity:1}
30%{opacity:0}
100%{opacity:0}
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
padding:20px;
}

.hero-text h1{
font-size:42px;
margin:0;
}

.hero-text p{
margin-top:10px;
font-size:20px;
}

</style>
